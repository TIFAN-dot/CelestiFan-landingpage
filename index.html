<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── FONT PERFORMANCE — async load eliminates render-blocking ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style"
      onload="this.onload=null;this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap"
    />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap"
      />
    </noscript>
    <link rel="preload" as="style"
      onload="this.onload=null;this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&display=swap"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&display=swap" />
    </noscript>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S2NR6RXKR7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied'
      });
    </script>

    <!-- ── FAVICON ── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- ── SEO / OG ── -->
    <title>CelestiFan — Amplify Artists. Ignite Fandom.</title>
    <meta
      name="description"
      content="CelestiFan is the fan engagement platform where your support moves music. Earn Celeste, climb leaderboards, connect with artists. Fan Lives Matter."
    />
    <meta property="og:title" content="CelestiFan — Amplify Artists. Ignite Fandom." />
    <meta
      property="og:description"
      content="The platform where fans fuel music breakthroughs. Support artists. Earn Celeste. Change the game."
    />
    <meta property="og:image" content="/fanliveimage1.webp" />
    <meta property="og:url" content="https://celestifan.com" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@celestifan_off" />
    <meta name="twitter:title" content="CelestiFan — Fan Lives Matter." />
    <meta
      name="twitter:description"
      content="The platform where fans fuel music breakthroughs. Support artists. Earn Celeste."
    />
    <meta name="twitter:image" content="/fanliveimage1.webp" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
